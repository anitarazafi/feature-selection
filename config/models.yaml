models:
  - random_forest
  - xgboost
  - mlp

hyperparameters:
  random_forest:
    n_estimators: 100
    max_depth: 10
    min_samples_leaf: 10
    random_state: 42
    n_jobs: -1
  xgboost:
    max_depth: 4
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    n_estimators: 200
    random_state: 42
    n_jobs: -1
    eval_metric: "logloss"
  mlp:
    hidden_layer_sizes: [32, 16]
    alpha: 0.1
    early_stopping: true
    validation_fraction: 0.1
    max_iter: 200
    random_state: 42
